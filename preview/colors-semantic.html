<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 24px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-1); }
  .item .chip { height: 56px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; }
  .item .body { padding: 8px 12px; background: var(--bg-page); }
  .item .body .n { font-weight: 600; font-size: 12px; color: var(--fg-1); }
  .item .body .h { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head><body>
<div class="card">
  <div class="label">Semantic & Accent Colors</div>
  <div class="grid">
    <div class="item"><div class="chip" style="background:var(--success); color:#fff">Success</div><div class="body"><div class="n">Success</div><div class="h">--bean-500</div></div></div>
    <div class="item"><div class="chip" style="background:var(--warning); color:#3a2a00">Warning</div><div class="body"><div class="n">Warning</div><div class="h">#F5A524</div></div></div>
    <div class="item"><div class="chip" style="background:var(--danger); color:#fff">Danger</div><div class="body"><div class="n">Danger</div><div class="h">#F25F5C</div></div></div>
    <div class="item"><div class="chip" style="background:var(--info); color:#fff">Info</div><div class="body"><div class="n">Info</div><div class="h">#2D8CFF</div></div></div>
    <div class="item"><div class="chip" style="background:var(--success-bg); color:var(--bean-700)">on soft</div><div class="body"><div class="n">Success bg</div><div class="h">--bean-50</div></div></div>
    <div class="item"><div class="chip" style="background:var(--warning-bg); color:#8a5a00">on soft</div><div class="body"><div class="n">Warning bg</div><div class="h">#FFF6E4</div></div></div>
    <div class="item"><div class="chip" style="background:var(--danger-bg); color:#a0322f">on soft</div><div class="body"><div class="n">Danger bg</div><div class="h">#FFECEB</div></div></div>
    <div class="item"><div class="chip" style="background:var(--info-bg); color:#1c5dbf">on soft</div><div class="body"><div class="n">Info bg</div><div class="h">#E6F1FF</div></div></div>
  </div>
</div>
</body></html>
