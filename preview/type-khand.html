<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 28px 32px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 18px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px dashed var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 120px; flex-shrink: 0; }
  .kh { font-family: var(--font-display-condensed); color: var(--fg-1); letter-spacing: 0; line-height: 1.05; }
</style></head><body>
<div class="card">
  <div class="label">Khand — Condensed Display (optional)</div>
  <div class="row"><div class="meta">700 · 64</div><div class="kh" style="font-size:64px; font-weight:700">DELIVER THE BEST.</div></div>
  <div class="row"><div class="meta">600 · 44</div><div class="kh" style="font-size:44px; font-weight:600">Beansmile E-commerce Engine</div></div>
  <div class="row"><div class="meta">500 · 28</div><div class="kh" style="font-size:28px; font-weight:500">Pioneer of the AI era — 200+ projects delivered</div></div>
  <div class="row"><div class="meta">400 · 18</div><div class="kh" style="font-size:18px; font-weight:400">Use sparingly for poster-style headlines, stats, and numeric callouts.</div></div>
</div>
</body></html>
