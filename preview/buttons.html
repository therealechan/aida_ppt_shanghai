<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); font-family: var(--font-sans); }
  .card { padding: 28px; box-sizing: border-box; width: 700px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); width: 100%; margin-bottom: 4px; }
  .btn { font-family: var(--font-sans); font-weight: 600; font-size: 15px; padding: 12px 22px; border-radius: var(--radius-pill); border: 0; cursor: pointer; transition: all var(--dur-fast) var(--ease-out); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--bean-500); color: #fff; box-shadow: var(--shadow-brand); }
  .btn-primary:hover { background: var(--bean-600); }
  .btn-secondary { background: var(--ink-900); color: #fff; }
  .btn-secondary:hover { background: var(--ink-700); }
  .btn-outline { background: transparent; color: var(--fg-1); border: 1.5px solid var(--border-2); }
  .btn-outline:hover { border-color: var(--ink-900); }
  .btn-ghost { background: transparent; color: var(--fg-brand); padding: 12px 16px; }
  .btn-ghost:hover { background: var(--bean-50); }
  .btn-sm { font-size: 13px; padding: 8px 16px; }
  .arrow { display: inline-block; transition: transform var(--dur-base); }
  .btn:hover .arrow { transform: translateX(3px); }
</style></head><body>
<div class="card">
  <div class="label">Buttons — Primary, Secondary, Outline, Ghost</div>
  <button class="btn btn-primary">Let's Talk</button>
  <button class="btn btn-secondary">Learn More <span class="arrow">→</span></button>
  <button class="btn btn-outline">View Portfolio</button>
  <button class="btn btn-ghost">Read case study <span class="arrow">→</span></button>
  <button class="btn btn-primary btn-sm">Contact</button>
  <button class="btn btn-outline btn-sm">Subscribe</button>
</div>
</body></html>
