<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 24px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; }
  .row { display: flex; gap: 8px; align-items: stretch; }
  .swatch { flex: 1; height: 72px; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; box-sizing: border-box; position: relative; }
  .swatch.light { border: 1px solid var(--border-1); }
  .swatch .name { font-size: 10px; font-family: var(--font-mono); }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
</style></head><body>
<div class="card">
  <div class="label">Neutrals — Ink Scale</div>
  <div class="row">
    <div class="swatch light" style="background:var(--ink-0); color: var(--ink-900)"><span class="hex">0</span><span class="name">#FFFFFF</span></div>
    <div class="swatch light" style="background:var(--ink-50); color: var(--ink-900)"><span class="hex">50</span><span class="name">#F7F9F8</span></div>
    <div class="swatch light" style="background:var(--ink-100); color: var(--ink-900)"><span class="hex">100</span><span class="name">#EEF2F0</span></div>
    <div class="swatch light" style="background:var(--ink-200); color: var(--ink-900)"><span class="hex">200</span><span class="name">#DDE4E0</span></div>
    <div class="swatch light" style="background:var(--ink-300); color: var(--ink-900)"><span class="hex">300</span><span class="name">#BCC7C0</span></div>
    <div class="swatch" style="background:var(--ink-400); color: var(--ink-0)"><span class="hex">400</span><span class="name">#8C9A92</span></div>
    <div class="swatch" style="background:var(--ink-500); color: var(--ink-0)"><span class="hex">500</span><span class="name">#5E6C64</span></div>
    <div class="swatch" style="background:var(--ink-600); color: var(--ink-0)"><span class="hex">600</span><span class="name">#3F4B45</span></div>
    <div class="swatch" style="background:var(--ink-700); color: var(--ink-0)"><span class="hex">700</span><span class="name">#2A332E</span></div>
    <div class="swatch" style="background:var(--ink-800); color: var(--ink-0)"><span class="hex">800</span><span class="name">#182018</span></div>
    <div class="swatch" style="background:var(--ink-900); color: var(--ink-0)"><span class="hex">900</span><span class="name">#0C1316</span></div>
  </div>
</div>
</body></html>
