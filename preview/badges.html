<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); font-family: var(--font-sans); }
  .card { padding: 28px; box-sizing: border-box; width: 700px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); width: 100%; margin-bottom: 4px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: var(--radius-pill); line-height: 1.4; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .b-brand { background: var(--bean-50); color: var(--bean-700); }
  .b-ink { background: var(--ink-100); color: var(--ink-700); }
  .b-solid { background: var(--bean-500); color: #fff; }
  .b-outline { background: transparent; color: var(--fg-1); border: 1px solid var(--border-2); }
  .b-success { background: var(--success-bg); color: var(--bean-700); }
  .b-warning { background: var(--warning-bg); color: #8a5a00; }
  .b-danger { background: var(--danger-bg); color: #a0322f; }
  .b-info { background: var(--info-bg); color: #1c5dbf; }
</style></head><body>
<div class="card">
  <div class="label">Badges & Tags</div>
  <span class="badge b-brand">WeChat Certified</span>
  <span class="badge b-solid">New</span>
  <span class="badge b-ink">10+ years</span>
  <span class="badge b-outline">Shopify Partner</span>
  <span class="badge b-success"><span class="dot" style="background:var(--bean-500)"></span>Live</span>
  <span class="badge b-warning"><span class="dot" style="background:var(--warning)"></span>In review</span>
  <span class="badge b-danger">Blocked</span>
  <span class="badge b-info">AI</span>
  <span class="badge b-brand">E-commerce</span>
  <span class="badge b-ink">Mobile</span>
  <span class="badge b-ink">Web</span>
  <span class="badge b-ink">iOS · Android</span>
</div>
</body></html>
