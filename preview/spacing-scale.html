<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 16px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
  .bar { background: var(--bean-200); height: 24px; border-radius: 4px; }
  .token { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 88px; flex-shrink: 0; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); width: 56px; flex-shrink: 0; }
</style></head><body>
<div class="card">
  <div class="label">Spacing Scale — 4pt Grid</div>
  <div class="row"><div class="token">--space-1</div><div class="val">4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="token">--space-2</div><div class="val">8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="token">--space-3</div><div class="val">12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="token">--space-4</div><div class="val">16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="token">--space-5</div><div class="val">24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="token">--space-6</div><div class="val">32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="token">--space-7</div><div class="val">48</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="token">--space-8</div><div class="val">64</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="token">--space-9</div><div class="val">96</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="token">--space-10</div><div class="val">128</div><div class="bar" style="width:128px"></div></div>
</div>
</body></html>
