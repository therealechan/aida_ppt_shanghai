<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 28px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .swatch { width: 72px; height: 72px; background: var(--bean-100); border: 1px solid var(--bean-300); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .val { font-weight: 600; font-size: 12px; color: var(--fg-1); }
</style></head><body>
<div class="card">
  <div class="label">Corner Radii</div>
  <div class="grid">
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-xs)"></div><div class="val">xs · 4</div><div class="name">--radius-xs</div></div>
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-sm)"></div><div class="val">sm · 8</div><div class="name">--radius-sm</div></div>
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-md)"></div><div class="val">md · 12</div><div class="name">--radius-md</div></div>
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-lg)"></div><div class="val">lg · 16</div><div class="name">--radius-lg</div></div>
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-xl)"></div><div class="val">xl · 24</div><div class="name">--radius-xl</div></div>
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-2xl)"></div><div class="val">2xl · 32</div><div class="name">--radius-2xl</div></div>
    <div class="cell"><div class="swatch" style="border-radius:var(--radius-pill)"></div><div class="val">pill</div><div class="name">--radius-pill</div></div>
    <div class="cell"><div class="swatch" style="clip-path: polygon(25% 4%, 75% 4%, 98% 50%, 75% 96%, 25% 96%, 2% 50%)"></div><div class="val">hex</div><div class="name">brand motif</div></div>
  </div>
</div>
</body></html>
