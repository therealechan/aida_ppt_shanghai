<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 28px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 20px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stat { text-align: center; padding: 22px 12px; border: 1px solid var(--border-1); border-radius: var(--radius-lg); background: var(--bg-subtle); }
  .stat .num { font-size: 48px; font-weight: 800; color: var(--fg-brand); letter-spacing: -0.03em; line-height: 1; }
  .stat .label-sm { font-size: 13px; color: var(--fg-2); margin-top: 8px; font-weight: 500; }
</style></head><body>
<div class="card">
  <div class="label">Stat Blocks — Proof Pattern</div>
  <div class="stats">
    <div class="stat"><div class="num">200<span style="color:var(--ink-800)">+</span></div><div class="label-sm">Projects Completed</div></div>
    <div class="stat"><div class="num">100<span style="color:var(--ink-800)">+</span></div><div class="label-sm">Clients</div></div>
    <div class="stat"><div class="num">10<span style="color:var(--ink-800)">+</span></div><div class="label-sm">Countries</div></div>
  </div>
</div>
</body></html>
