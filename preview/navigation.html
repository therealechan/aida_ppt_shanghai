<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-subtle); font-family: var(--font-sans); }
  .card { padding: 24px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 14px; }
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    height: 64px;
    padding: 0 20px;
    background: #fff;
    border: 1px solid var(--border-1);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }
  .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .brand img { height: 32px; width: 32px; display: block; }
  .brand span { font-weight: 700; font-size: 17px; color: var(--fg-1); letter-spacing: -0.01em; }
  .links { display: flex; gap: 24px; flex: 1; justify-content: center; }
  .links a { font-size: 14px; font-weight: 500; color: var(--fg-2); text-decoration: none; white-space: nowrap; }
  .links a.active { color: var(--fg-brand); }
  .right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .lang {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 500; color: var(--fg-2);
    padding: 7px 12px;
    border: 1px solid var(--border-1);
    border-radius: var(--radius-pill);
    background: #fff;
    line-height: 1;
  }
  .lang small { font-size: 9px; color: var(--fg-3); }
  .cta {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    color: #fff; background: var(--bean-500);
    padding: 9px 18px;
    border: 0;
    border-radius: var(--radius-pill);
    box-shadow: var(--shadow-brand);
    cursor: pointer;
    line-height: 1;
  }
  .cta .arr { font-size: 12px; }
</style></head><body>
<div class="card">
  <div class="label">Top Navigation — Marketing</div>
  <div class="nav">
    <div class="brand">
      <img src="../assets/logo-hex-bean.png" alt="">
      <span>Beansmile</span>
    </div>
    <div class="links">
      <a class="active">Home</a>
      <a>Portfolio</a>
      <a>Publication</a>
      <a>Community</a>
      <a>Contact</a>
    </div>
    <div class="right">
      <button class="lang">EN <small>▾</small></button>
      <button class="cta">Let's Talk <span class="arr">→</span></button>
    </div>
  </div>
</div>
</body></html>
