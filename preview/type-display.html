<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 28px 32px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 20px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px dashed var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 120px; flex-shrink: 0; }
</style></head><body>
<div class="card">
  <div class="label">Display & Headings — Inter</div>
  <div class="row"><div class="meta">display · 800 · 64</div><div class="display">Deliver the best.</div></div>
  <div class="row"><div class="meta">h1 · 700 · 48</div><h1>What we can do for you</h1></div>
  <div class="row"><div class="meta">h2 · 700 · 36</div><h2>Introducing team Beansmile</h2></div>
  <div class="row"><div class="meta">h3 · 700 · 28</div><h3>Beansmile E-commerce Engine</h3></div>
  <div class="row"><div class="meta">h4 · 600 · 22</div><h4>Experienced experts</h4></div>
  <div class="row"><div class="meta">h5 · 600 · 18</div><h5>Community Support &amp; Sponsorships</h5></div>
</div>
</body></html>
