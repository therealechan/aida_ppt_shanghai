<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); font-family: var(--font-sans); }
  .card { padding: 24px 28px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .logo-tile { aspect-ratio: 1.6; border: 1px solid var(--border-1); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; background: #fff; font-weight: 700; color: var(--fg-2); font-size: 14px; letter-spacing: -0.01em; }
  .note { font-size: 11px; color: var(--fg-3); margin-top: 10px; font-style: italic; }
</style></head><body>
<div class="card">
  <div class="label">Client Logo Grid (pattern) — 15 real clients</div>
  <div class="grid">
    <div class="logo-tile">Google</div>
    <div class="logo-tile">NBA</div>
    <div class="logo-tile">WeChat</div>
    <div class="logo-tile">Douyin</div>
    <div class="logo-tile">ZEISS</div>
    <div class="logo-tile">VISA</div>
    <div class="logo-tile">SIXT</div>
    <div class="logo-tile">Mead Johnson</div>
    <div class="logo-tile">Durex</div>
    <div class="logo-tile">三只松鼠</div>
    <div class="logo-tile">Calvin Klein</div>
    <div class="logo-tile">Dettol</div>
    <div class="logo-tile">VW</div>
    <div class="logo-tile">Flexform</div>
    <div class="logo-tile">Global Express</div>
    <div class="logo-tile" style="color: var(--fg-3); font-size: 12px; font-weight: 500">+85 more</div>
  </div>
  <div class="note">Replace tiles with real logo imagery once available (see README substitution note).</div>
</div>
</body></html>
