<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-50); }
  .card { padding: 40px 28px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 86px; height: 86px; background: #fff; border-radius: 12px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: center; }
  .val { font-weight: 600; font-size: 12px; color: var(--fg-1); }
</style></head><body>
<div class="card">
  <div class="label">Elevation / Shadow System</div>
  <div class="grid">
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-xs)"></div><div class="val">xs</div><div class="name">--shadow-xs</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-sm)"></div><div class="val">sm</div><div class="name">--shadow-sm</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-md)"></div><div class="val">md</div><div class="name">--shadow-md</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-lg)"></div><div class="val">lg</div><div class="name">--shadow-lg</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-brand); background: var(--bean-500)"></div><div class="val">brand</div><div class="name">--shadow-brand</div></div>
  </div>
</div>
</body></html>
