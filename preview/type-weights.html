<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); }
  .card { padding: 28px; box-sizing: border-box; width: 700px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cell { border: 1px solid var(--border-1); border-radius: 12px; padding: 16px 18px; }
  .cell .w { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 6px; }
  .sample { font-family: var(--font-sans); font-size: 22px; color: var(--fg-1); letter-spacing: -0.01em; }
</style></head><body>
<div class="card">
  <div class="label">Font Weights — Inter</div>
  <div class="grid">
    <div class="cell"><div class="w">400 · Regular</div><div class="sample" style="font-weight:400">The quick brown fox 快速</div></div>
    <div class="cell"><div class="w">500 · Medium</div><div class="sample" style="font-weight:500">The quick brown fox 快速</div></div>
    <div class="cell"><div class="w">600 · Semibold</div><div class="sample" style="font-weight:600">The quick brown fox 快速</div></div>
    <div class="cell"><div class="w">700 · Bold</div><div class="sample" style="font-weight:700">The quick brown fox 快速</div></div>
    <div class="cell" style="grid-column: span 2"><div class="w">800 · Black (display)</div><div class="sample" style="font-weight:800; font-size:32px">Deliver the best. 最好的交付</div></div>
  </div>
</div>
</body></html>
